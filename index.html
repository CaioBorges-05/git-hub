<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Code Startup — Bem-vindo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #08080A;
      --surface: #111115;
      --lime:    #C8FF00;
      --white:   #F0EFE8;
      --muted:   #5A5A6A;
      --border:  #1E1E28;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── canvas de fundo ── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* grade de pontos */
    .bg-canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, #ffffff08 1px, transparent 1px);
      background-size: 38px 38px;
    }

    /* manchas de luz */
    .bg-canvas::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 40% at 15% 85%, #C8FF0012 0%, transparent 60%),
        radial-gradient(ellipse 45% 50% at 85% 10%, #6B4EFF10 0%, transparent 60%);
    }

    /* ── ghost text decorativo ── */
    .ghost {
      position: fixed;
      bottom: -0.12em;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Unbounded', sans-serif;
      font-weight: 900;
      font-size: clamp(6rem, 18vw, 18rem);
      letter-spacing: -0.04em;
      white-space: nowrap;
      color: transparent;
      -webkit-text-stroke: 1px #ffffff06;
      pointer-events: none;
      user-select: none;
      z-index: 0;
      animation: ghost-in 1.4s cubic-bezier(.16,1,.3,1) both;
      animation-delay: .3s;
    }

    /* ── layout principal ── */
    main {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      gap: 0;
    }

    /* ── badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 999px;
      padding: 6px 16px 6px 10px;
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
      animation: fade-up .8s cubic-bezier(.16,1,.3,1) both;
      animation-delay: .5s;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--lime);
      box-shadow: 0 0 8px var(--lime);
      animation: pulse 2.4s ease-in-out infinite;
    }

    /* ── eyebrow ── */
    .eyebrow {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(0.55rem, 1.2vw, 0.7rem);
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--lime);
      margin-bottom: 1.2rem;
      animation: fade-up .8s cubic-bezier(.16,1,.3,1) both;
      animation-delay: .65s;
    }

    /* ── headline ── */
    h1 {
      font-family: 'Unbounded', sans-serif;
      font-weight: 900;
      font-size: clamp(3rem, 9vw, 8.5rem);
      line-height: 0.92;
      letter-spacing: -0.03em;
      color: var(--white);
      animation: fade-up .9s cubic-bezier(.16,1,.3,1) both;
      animation-delay: .75s;
    }

    h1 em {
      font-style: normal;
      color: transparent;
      -webkit-text-stroke: 2px var(--lime);
      filter: drop-shadow(0 0 24px var(--lime));
    }

    /* ── divisor ── */
    .divider {
      width: 48px;
      height: 2px;
      background: var(--lime);
      margin: 2.2rem auto;
      animation: fade-up .8s cubic-bezier(.16,1,.3,1) both;
      animation-delay: .9s;
    }

    /* ── subtítulo ── */
    p.sub {
      font-size: clamp(0.9rem, 1.6vw, 1.05rem);
      font-weight: 300;
      line-height: 1.7;
      color: var(--muted);
      max-width: 38ch;
      animation: fade-up .8s cubic-bezier(.16,1,.3,1) both;
      animation-delay: 1s;
    }

    p.sub strong {
      color: var(--white);
      font-weight: 400;
    }

    /* ── footer ── */
    footer {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      animation: fade-up .8s cubic-bezier(.16,1,.3,1) both;
      animation-delay: 1.2s;
    }

    footer span {
      color: var(--lime);
    }

    /* ── animações ── */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes ghost-in {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(1.35); }
    }
  </style>
</head>
<body>

  <div class="bg-canvas"></div>
  <div class="ghost" aria-hidden="true">NCS</div>

  <main>
    <div class="badge">
      <span class="badge-dot"></span>
      No Code Startup
    </div>

    <p class="eyebrow">Bem-vindo à turma</p>

    <h1>Você <br><em>chegou.</em></h1>

    <div class="divider"></div>

    <p class="sub">
      Estamos felizes em ter você aqui.<br>
      Prepare-se para <strong>construir, lançar e crescer</strong><br>
      sem precisar de uma linha de código.
    </p>
  </main>

  <footer>© 2026 <span>No Code Startup</span></footer>

</body>
</html>
